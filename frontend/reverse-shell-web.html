


<!DOCTYPE html>
<html>
<head>
    <title>Reverse Shell</title>
    <style>
        body { background: black; color: #0f0; font-family: monospace; padding: 20px; }
        button, input { background: #111; border: 1px solid #0f0; color: #0f0; padding: 8px; margin: 5px; }
        .terminal { background: #000; border: 1px solid #0f0; height: 300px; overflow-y: auto; padding: 10px; }
    </style>
</head>
<body>
<h1>🔴 REVERSE SHELL</h1>

<div>
    <h3>Listener</h3>
    <input type="number" id="port" value="4444">
    <button onclick="startListener()">Start</button>
    <button onclick="stopListener()">Stop</button>
    <span id="status">⚪ Not running</span>
</div>

<div>
    <h3>Payload</h3>
    <input type="text" id="ip" placeholder="Your IP">
    <button onclick="generatePayload()">Generate</button>
    <pre id="payload" style="background:#111; padding:10px;"></pre>
</div>

<div>
    <h3>Shell <span id="connStatus">🔴</span></h3>
    <div class="terminal" id="terminal"></div>
    <input type="text" id="cmd" placeholder="command">
    <button onclick="sendCmd()">Send</button>
    <button onclick="clearTerminal()">Clear</button>
</div>

<script>
    let listenerActive = false;
    let connected = false;
    
    async function startListener() {
        const port = document.getElementById('port').value;
        const res = await fetch('/api/reverse/start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ port: parseInt(port) })
        });
        const data = await res.json();
        if (data.status === 'success') {
            listenerActive = true;
            document.getElementById('status').innerHTML = '✅ Listening on ' + port;
            startPolling();
        } else {
            alert(data.message);
        }
    }
    
    async function stopListener() {
        await fetch('/api/reverse/stop', { method: 'POST' });
        listenerActive = false;
        document.getElementById('status').innerHTML = '⚪ Stopped';
    }
    
    async function generatePayload() {
        const ip = document.getElementById('ip').value;
        const port = document.getElementById('port').value;
        const res = await fetch('/api/reverse/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ip, port: parseInt(port) })
        });
        const data = await res.json();
        if (data.status === 'success') {
            document.getElementById('payload').innerText = data.payloads.python3;
        }
    }
    
    async function sendCmd() {
        const cmd = document.getElementById('cmd').value;
        if (!cmd) return;
        appendToTerminal('$ ' + cmd + '\n');
        document.getElementById('cmd').value = '';
        const res = await fetch('/api/reverse/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cmd })
        });
        const data = await res.json();
        if (data.status === 'success') {
            appendToTerminal(data.output);
        } else {
            appendToTerminal('Error: ' + data.message + '\n');
        }
    }
    
    function appendToTerminal(text) {
        const term = document.getElementById('terminal');
        const line = document.createElement('div');
        line.innerText = text;
        term.appendChild(line);
        term.scrollTop = term.scrollHeight;
    }
    
    function clearTerminal() {
        document.getElementById('terminal').innerHTML = '';
    }
    
    async function startPolling() {
        setInterval(async () => {
            const res = await fetch('/api/reverse/status');
            const data = await res.json();
            if (data.connected !== connected) {
                connected = data.connected;
                document.getElementById('connStatus').innerHTML = connected ? '🟢' : '🔴';
                if (connected) appendToTerminal('\n[+] Connected!\n');
            }
        }, 2000);
    }
    
    // Auto-detect IP
    fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(d => { if(d.ip) document.getElementById('ip').value = d.ip; });
</script>
</body>
</html>
